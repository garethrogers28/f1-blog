{% extends "base.html" %}

{% block title %}Delete Comment | F1 Blog{% endblock %}

{% block content %}
<h2>Delete Comment</h2>
<div class="card mb-3">
    <div class="card-body">
        <p>{{ comment.body }}</p>
        <p class="text-muted small">{{ comment.author }} &mdash; {{ comment.created_on|date:"F j, Y H:i" }}</p>
    </div>
</div>
<p>Are you sure you want to delete this comment?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'post_detail' comment.post.slug %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
